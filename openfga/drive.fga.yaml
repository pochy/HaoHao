name: HaoHao Drive Model Tests
model_file: ./drive.fga

tests:
  - name: dataset resource action permissions
    tuples:
      - user: user:dataset-owner
        relation: owner
        object: dataset:customers
      - user: user:dataset-viewer
        relation: viewer
        object: dataset:customers
      - user: user:dataset-runner
        relation: query_runner
        object: dataset:customers
    check:
      - user: user:dataset-owner
        object: dataset:customers
        assertions:
          can_view: true
          can_preview: true
          can_query: true
          can_export: true
          can_update: true
          can_delete: true
          can_manage_permissions: true
      - user: user:dataset-viewer
        object: dataset:customers
        assertions:
          can_view: true
          can_preview: true
          can_query: false
          can_export: false
          can_update: false
          can_delete: false
      - user: user:dataset-runner
        object: dataset:customers
        assertions:
          can_view: false
          can_query: true
          can_export: true

  - name: dataset group and tenant scope permissions
    tuples:
      - user: user:analyst
        relation: member
        object: dataset_group:all-analysts
      - user: dataset_group:all-analysts#member
        relation: dataset_viewer
        object: data_scope:acme
      - user: data_scope:acme
        relation: scope
        object: dataset:sales
      - user: data_scope:acme
        relation: scope
        object: work_table:summary
      - user: data_scope:acme
        relation: scope
        object: data_pipeline:daily-refresh
    check:
      - user: user:analyst
        object: dataset:sales
        assertions:
          can_view: true
          can_update: false
      - user: user:analyst
        object: work_table:summary
        assertions:
          can_view: false
      - user: user:analyst
        object: data_pipeline:daily-refresh
        assertions:
          can_view: false

  - name: pipeline owner can run and manage schedules
    tuples:
      - user: user:pipeline-owner
        relation: owner
        object: data_pipeline:daily-refresh
      - user: user:pipeline-viewer
        relation: viewer
        object: data_pipeline:daily-refresh
    check:
      - user: user:pipeline-owner
        object: data_pipeline:daily-refresh
        assertions:
          can_view: true
          can_update: true
          can_save_version: true
          can_publish_version: true
          can_preview: true
          can_run: true
          can_manage_schedule: true
      - user: user:pipeline-viewer
        object: data_pipeline:daily-refresh
        assertions:
          can_view: true
          can_preview: true
          can_run: false

  - name: direct owner editor viewer permissions
    tuples:
      - user: user:owner
        relation: owner
        object: file:owner-doc
      - user: user:editor
        relation: editor
        object: file:editor-doc
      - user: user:viewer
        relation: viewer
        object: file:viewer-doc
    check:
      - user: user:owner
        object: file:owner-doc
        assertions:
          owner: true
          editor: true
          viewer: true
          can_view: true
          can_download: true
          can_edit: true
          can_delete: true
          can_share: true
      - user: user:editor
        object: file:editor-doc
        assertions:
          owner: false
          editor: true
          viewer: true
          can_view: true
          can_download: true
          can_edit: true
          can_delete: false
          can_share: false
      - user: user:viewer
        object: file:viewer-doc
        assertions:
          owner: false
          editor: false
          viewer: true
          can_view: true
          can_download: true
          can_edit: false
          can_delete: false
          can_share: false

  - name: folder inheritance
    tuples:
      - user: user:folder-viewer
        relation: viewer
        object: folder:root
      - user: user:folder-editor
        relation: editor
        object: folder:root
      - user: folder:root
        relation: parent
        object: folder:child
      - user: folder:child
        relation: parent
        object: file:child-doc
    check:
      - user: user:folder-viewer
        object: folder:child
        assertions:
          can_view: true
          can_edit: false
      - user: user:folder-viewer
        object: file:child-doc
        assertions:
          can_view: true
          can_edit: false
      - user: user:folder-editor
        object: folder:child
        assertions:
          can_view: true
          can_edit: true
      - user: user:folder-editor
        object: file:child-doc
        assertions:
          can_view: true
          can_edit: true

  - name: inheritance stops without parent tuple
    tuples:
      - user: user:root-viewer
        relation: viewer
        object: folder:root
      - user: folder:child
        relation: parent
        object: file:child-doc
    check:
      - user: user:root-viewer
        object: file:child-doc
        assertions:
          can_view: false
          can_edit: false

  - name: group member share
    tuples:
      - user: user:engineer
        relation: member
        object: group:engineering
      - user: group:engineering#member
        relation: editor
        object: folder:shared-project
      - user: folder:shared-project
        relation: parent
        object: file:spec
    check:
      - user: user:engineer
        object: file:spec
        assertions:
          can_view: true
          can_download: true
          can_edit: true
          can_delete: false
          can_share: false

  - name: expiring share link
    tuples:
      - user: share_link:live-link
        relation: viewer
        object: file:linked-doc
        condition:
          name: not_expired
          context:
            expires_at: "2026-05-01T00:00:00Z"
      - user: share_link:expired-link
        relation: viewer
        object: file:linked-doc
        condition:
          name: not_expired
          context:
            expires_at: "2026-04-01T00:00:00Z"
    check:
      - user: share_link:live-link
        object: file:linked-doc
        context:
          current_time: "2026-04-26T00:00:00Z"
        assertions:
          can_view: true
          can_download: true
      - user: share_link:expired-link
        object: file:linked-doc
        context:
          current_time: "2026-04-26T00:00:00Z"
        assertions:
          can_view: false
          can_download: false

  - name: workspace inheritance
    tuples:
      - user: user:workspace-owner
        relation: owner
        object: workspace:product
      - user: user:workspace-viewer
        relation: viewer
        object: workspace:product
      - user: workspace:product
        relation: workspace
        object: folder:workspace-root
      - user: workspace:product
        relation: workspace
        object: file:workspace-doc
      - user: folder:workspace-root
        relation: parent
        object: file:workspace-child-doc
    check:
      - user: user:workspace-owner
        object: folder:workspace-root
        assertions:
          can_view: true
          can_edit: true
          can_share: true
      - user: user:workspace-viewer
        object: file:workspace-doc
        assertions:
          can_view: true
          can_download: true
          can_edit: false
      - user: user:workspace-viewer
        object: file:workspace-child-doc
        assertions:
          can_view: true
          can_edit: false

  - name: anonymous editor share link
    tuples:
      - user: share_link:editor-link
        relation: editor
        object: file:public-edit-doc
        condition:
          name: not_expired
          context:
            expires_at: "2026-05-01T00:00:00Z"
      - user: share_link:viewer-link
        relation: viewer
        object: file:public-edit-doc
        condition:
          name: not_expired
          context:
            expires_at: "2026-05-01T00:00:00Z"
    check:
      - user: share_link:editor-link
        object: file:public-edit-doc
        context:
          current_time: "2026-04-26T00:00:00Z"
        assertions:
          can_view: true
          can_download: true
          can_edit: true
      - user: share_link:viewer-link
        object: file:public-edit-doc
        context:
          current_time: "2026-04-26T00:00:00Z"
        assertions:
          can_view: true
          can_edit: false

  - name: clean room participant and reviewer
    tuples:
      - user: user:room-owner
        relation: owner
        object: clean_room:joint-analysis
      - user: user:room-participant
        relation: participant
        object: clean_room:joint-analysis
      - user: user:room-reviewer
        relation: reviewer
        object: clean_room:joint-analysis
    check:
      - user: user:room-owner
        object: clean_room:joint-analysis
        assertions:
          can_view: true
          can_submit_dataset: true
          can_approve_export: true
      - user: user:room-participant
        object: clean_room:joint-analysis
        assertions:
          can_view: true
          can_submit_dataset: true
          can_approve_export: false
      - user: user:room-reviewer
        object: clean_room:joint-analysis
        assertions:
          can_view: true
          can_submit_dataset: false
          can_approve_export: true
