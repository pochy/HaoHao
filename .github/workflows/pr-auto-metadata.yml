name: pr-auto-metadata

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

concurrency:
  group: pr-auto-metadata-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  apply-metadata:
    runs-on: ubuntu-latest
    env:
      PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
    steps:
      - name: Apply labels from changed paths
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure assignee and milestone
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEFAULT_ASSIGNEE: pochy
          DEFAULT_MILESTONE: v0.1 Foundation
        run: |
          set -euo pipefail

          if [ -n "${DEFAULT_ASSIGNEE}" ]; then
            gh pr edit "${PR_NUMBER}" --add-assignee "${DEFAULT_ASSIGNEE}"
          fi

          if [ -n "${DEFAULT_MILESTONE}" ]; then
            gh pr edit "${PR_NUMBER}" --milestone "${DEFAULT_MILESTONE}"
          fi

      - name: Add priority and track labels from metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          TEXT="$(printf '%s %s %s' "${PR_TITLE}" "${PR_BODY}" "${PR_BRANCH}" | tr '[:upper:]' '[:lower:]')"

          PRIORITY_LABEL="priority:medium"
          TRACK_LABEL=""
          EXISTING_LABELS=""

          # Priority labels
          case "${TEXT}" in
            *priority:high*|*priority/high*) PRIORITY_LABEL="priority:high" ;;
            *) PRIORITY_LABEL="priority:medium" ;;
          esac

          # Track labels
          if [[ "${TEXT}" =~ (^|[^0-9])phase-1([^0-9]|$) ]] || [[ "${TEXT}" =~ (^|[^0-9])todo[[:space:]]+1([^0-9]|$) ]]; then
            TRACK_LABEL="track:phase-1"
          elif [[ "${TEXT}" =~ (^|[^0-9])phase-2([^0-9]|$) ]] || [[ "${TEXT}" =~ (^|[^0-9])todo[[:space:]]+2([^0-9]|$) ]]; then
            TRACK_LABEL="track:phase-2"
          elif [[ "${TEXT}" =~ (^|[^0-9])phase-3([^0-9]|$) ]] || [[ "${TEXT}" =~ (^|[^0-9])todo[[:space:]]+3([^0-9]|$) ]]; then
            TRACK_LABEL="track:phase-3"
          elif [[ "${TEXT}" =~ (^|[^0-9])phase-4([^0-9]|$) ]] || [[ "${TEXT}" =~ (^|[^0-9])todo[[:space:]]+4([^0-9]|$) ]]; then
            TRACK_LABEL="track:phase-4"
          elif [[ "${TEXT}" =~ (^|[^0-9])phase-5([^0-9]|$) ]] || [[ "${TEXT}" =~ (^|[^0-9])todo[[:space:]]+5([^0-9]|$) ]]; then
            TRACK_LABEL="track:phase-5"
          fi

          EXISTING_LABELS="$(gh pr view "${PR_NUMBER}" --json labels --jq '.labels[].name')"

          # Keep labels idempotent by removing previous class labels first.
          while IFS= read -r label; do
            if [[ "${label}" == priority:* ]] || [[ "${label}" == track:phase-* ]]; then
              gh pr edit "${PR_NUMBER}" --remove-label "${label}"
            fi
          done <<< "${EXISTING_LABELS}"

          gh pr edit "${PR_NUMBER}" --add-label "${PRIORITY_LABEL}"
          if [ -n "${TRACK_LABEL}" ]; then
            gh pr edit "${PR_NUMBER}" --add-label "${TRACK_LABEL}"
          fi

      - name: Add PR to project
        # Required: create repository secret PROJECTS_TOKEN with project scope.
        if: ${{ env.PROJECTS_TOKEN != '' }}
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/pochy/projects/3
          github-token: ${{ env.PROJECTS_TOKEN }}
