name: CI

on:
  pull_request:
  # push:
  #   branches:
  #     - main
  #     - handmaid2

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: haohao
          POSTGRES_USER: haohao
          POSTGRES_PASSWORD: haohao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haohao -d haohao"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7.4
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://haohao:haohao@127.0.0.1:5432/haohao?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.0
          go install github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.3

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browsers
        run: npm --prefix frontend exec -- playwright install --with-deps chromium

      - name: Go tests
        run: go test ./backend/...

      - name: Smoke script syntax
        run: |
          bash -n scripts/smoke-operability.sh
          bash -n scripts/e2e-single-binary.sh

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Embedded binary build
        run: CGO_ENABLED=0 go build -buildvcs=false -trimpath -tags "embed_frontend nomsgpack" -ldflags "-s -w -buildid=" -o ./bin/haohao ./backend/cmd/main

      - name: UI E2E
        run: make e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

      - name: Generated drift
        run: |
          make gen
          git diff --exit-code -- openapi/openapi.yaml openapi/browser.yaml openapi/external.yaml frontend/src/api/generated backend/internal/db

      - name: DB schema drift
        run: |
          migrate -path db/migrations -database "$DATABASE_URL" up
          PGPASSWORD=haohao pg_dump --schema-only --no-owner --no-privileges -h 127.0.0.1 -U haohao -d haohao \
            | sed '/^\\restrict /d; /^\\unrestrict /d' \
            | perl -0pe 's/\n+\z/\n/' > db/schema.sql
          git diff --exit-code -- db/schema.sql

      - name: OpenAPI validate
        run: |
          for spec in openapi/openapi.yaml openapi/browser.yaml openapi/external.yaml; do
            test -s "$spec"
            grep -Eq '^openapi: "?(3\.1|3\.1\.)' "$spec"
          done
          ! grep -Eq '/api/(external|m2m|scim)/' openapi/browser.yaml
          ! grep -Eq 'bearerAuth|m2mBearerAuth' openapi/browser.yaml
          ! grep -Eq '/api/v1/' openapi/external.yaml
          ! grep -Eq 'cookieAuth' openapi/external.yaml

      - name: Zitadel compose config
        run: docker compose --env-file dev/zitadel/.env.example -f dev/zitadel/docker-compose.yml config --quiet

      - name: Docker build
        run: docker build -t haohao:ci -f docker/Dockerfile .

      - name: Whitespace check
        run: git diff --check
