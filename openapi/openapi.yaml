components:
  schemas:
    AuthSettingsBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/AuthSettingsBody.json
          format: uri
          readOnly: true
          type: string
        mode:
          examples:
            - local
          type: string
        zitadel:
          $ref: "#/components/schemas/ZitadelSettingsBody"
      required:
        - mode
      type: object
    Cookie:
      additionalProperties: false
      properties:
        Domain:
          type: string
        Expires:
          format: date-time
          type: string
        HttpOnly:
          type: boolean
        MaxAge:
          format: int64
          type: integer
        Name:
          type: string
        Partitioned:
          type: boolean
        Path:
          type: string
        Quoted:
          type: boolean
        Raw:
          type: string
        RawExpires:
          type: string
        SameSite:
          format: int64
          type: integer
        Secure:
          type: boolean
        Unparsed:
          items:
            type: string
          type:
            - array
            - "null"
        Value:
          type: string
      required:
        - Name
        - Value
        - Quoted
        - Path
        - Domain
        - Expires
        - RawExpires
        - MaxAge
        - Secure
        - HttpOnly
        - SameSite
        - Partitioned
        - Raw
        - Unparsed
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    ExternalMeBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ExternalMeBody.json
          format: uri
          readOnly: true
          type: string
        authorizedParty:
          examples:
            - "312345678901234568"
          type: string
        groups:
          examples:
            - - external_api_user
          items:
            type: string
          type:
            - array
            - "null"
        provider:
          examples:
            - zitadel
          type: string
        roles:
          examples:
            - - todo_user
          items:
            type: string
          type:
            - array
            - "null"
        scopes:
          examples:
            - - external:read
          items:
            type: string
          type:
            - array
            - "null"
        subject:
          examples:
            - "312345678901234567"
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
      required:
        - provider
        - subject
      type: object
    LoginInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/LoginInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          examples:
            - demo@example.com
          format: email
          type: string
        password:
          examples:
            - changeme123
          minLength: 8
          type: string
      required:
        - email
        - password
      type: object
    LogoutBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/LogoutBody.json
          format: uri
          readOnly: true
          type: string
        postLogoutURL:
          examples:
            - http://localhost:8081/oidc/v1/end_session?id_token_hint=...
          format: uri
          type: string
      type: object
    SessionBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SessionBody.json
          format: uri
          readOnly: true
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
      required:
        - user
      type: object
    UserResponse:
      additionalProperties: false
      properties:
        displayName:
          examples:
            - Demo User
          type: string
        email:
          examples:
            - demo@example.com
          format: email
          type: string
        publicId:
          examples:
            - 018f2f05-c6c9-7a49-b32d-04f4dd84ef4a
          format: uuid
          type: string
      required:
        - publicId
        - email
        - displayName
      type: object
    ZitadelSettingsBody:
      additionalProperties: false
      properties:
        clientId:
          examples:
            - "312345678901234567"
          type: string
        issuer:
          examples:
            - http://localhost:8081
          format: uri
          type: string
      required:
        - issuer
        - clientId
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
    cookieAuth:
      in: cookie
      name: SESSION_ID
      type: apiKey
info:
  title: HaoHao API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/external/v1/me:
    get:
      operationId: getExternalMe
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMeBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: 現在の external bearer principal を返す
      tags:
        - external
  /api/v1/auth/callback:
    get:
      operationId: finishOIDCLogin
      parameters:
        - explode: false
          in: query
          name: code
          schema:
            type: string
        - explode: false
          in: query
          name: state
          schema:
            type: string
        - explode: false
          in: query
          name: error
          schema:
            type: string
        - explode: false
          in: query
          name: error_description
          schema:
            type: string
      responses:
        "302":
          description: Found
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: OIDC callback を完了する
      tags:
        - auth
  /api/v1/auth/login:
    get:
      operationId: startOIDCLogin
      parameters:
        - explode: false
          in: query
          name: returnTo
          schema:
            type: string
      responses:
        "302":
          description: Found
          headers:
            Location:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: OIDC login を開始する
      tags:
        - auth
  /api/v1/auth/settings:
    get:
      operationId: getAuthSettings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSettingsBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: 現在の認証モード設定を返す
      tags:
        - auth
  /api/v1/csrf:
    get:
      operationId: getCSRF
      parameters:
        - in: cookie
          name: SESSION_ID
          schema:
            $ref: "#/components/schemas/Cookie"
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: CSRF token を再発行する
      tags:
        - session
  /api/v1/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionBody"
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: ログインして Cookie セッションを払い出す
      tags:
        - session
  /api/v1/logout:
    post:
      operationId: logout
      parameters:
        - in: cookie
          name: SESSION_ID
          schema:
            $ref: "#/components/schemas/Cookie"
        - in: header
          name: X-CSRF-Token
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutBody"
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: セッションを破棄する
      tags:
        - session
  /api/v1/session:
    get:
      operationId: getSession
      parameters:
        - in: cookie
          name: SESSION_ID
          schema:
            $ref: "#/components/schemas/Cookie"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: 現在のセッションを返す
      tags:
        - session
  /api/v1/session/refresh:
    post:
      operationId: refreshSession
      parameters:
        - in: cookie
          name: SESSION_ID
          schema:
            $ref: "#/components/schemas/Cookie"
        - in: header
          name: X-CSRF-Token
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: セッションを再発行する
      tags:
        - session
