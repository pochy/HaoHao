info:
  title: HaoHao API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/external/v1/me:
    get:
      operationId: getExternalMe
      parameters:
        - description: tenant slug for tenant-aware bearer context
          in: header
          name: X-Tenant-ID
          schema:
            description: tenant slug for tenant-aware bearer context
            examples:
              - acme
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMeBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: 現在の external bearer principal を返す
      tags:
        - external
  /api/m2m/v1/self:
    get:
      operationId: getM2MSelf
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M2MSelfBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - m2mBearerAuth: []
      summary: 現在の M2M machine client を返す
      tags:
        - m2m
  /api/public/drive/share-links/{token}:
    get:
      operationId: getPublicDriveShareLink
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicDriveShareLinkOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: public Drive share link metadata を返す
      tags:
        - drive-public
  /api/scim/v2/Users:
    get:
      operationId: scimListUsers
      parameters:
        - explode: false
          in: query
          name: filter
          schema:
            type: string
        - explode: false
          in: query
          name: startIndex
          schema:
            default: 1
            format: int32
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: count
          schema:
            default: 100
            format: int32
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SCIMListResponseBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: SCIM user を list する
      tags:
        - scim
    post:
      operationId: scimCreateUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SCIMUserBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SCIMUserBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: SCIM user を作成または upsert する
      tags:
        - scim
  /api/scim/v2/Users/{id}:
    delete:
      operationId: scimDeleteUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: SCIM user を deactivate する
      tags:
        - scim
    get:
      operationId: scimGetUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SCIMUserBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: SCIM user を取得する
      tags:
        - scim
    patch:
      operationId: scimPatchUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SCIMPatchInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SCIMUserBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: SCIM user を patch する
      tags:
        - scim
    put:
      operationId: scimReplaceUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SCIMUserBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SCIMUserBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: SCIM user を置換する
      tags:
        - scim
  /api/v1/admin/tenants:
