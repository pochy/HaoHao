components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    ExternalHealthBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ExternalHealthBody.json
          format: uri
          readOnly: true
          type: string
        service:
          examples:
            - haohao-external-api
          type: string
        status:
          examples:
            - ok
          type: string
        time:
          format: date-time
          type: string
        version:
          examples:
            - 0.1.0
          type: string
      required:
        - status
        - service
        - version
        - time
      type: object
    HealthBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HealthBody.json
          format: uri
          readOnly: true
          type: string
        service:
          examples:
            - haohao-browser-api
          type: string
        status:
          examples:
            - ok
          type: string
        time:
          format: date-time
          type: string
        version:
          examples:
            - 0.1.0
          type: string
      required:
        - status
        - service
        - version
        - time
      type: object
    SessionBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/SessionBody.json
          format: uri
          readOnly: true
          type: string
        apiSurface:
          examples:
            - browser
          type: string
        authMode:
          examples:
            - stub
          type: string
        authenticated:
          examples:
            - false
          type: boolean
        csrfCookie:
          examples:
            - XSRF-TOKEN
          type: string
      required:
        - authenticated
        - authMode
        - apiSurface
        - csrfCookie
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: External client bearer token authentication
      scheme: bearer
      type: http
    cookieAuth:
      description: Browser session cookie authentication
      in: cookie
      name: SESSION_ID
      type: apiKey
    csrfHeader:
      in: header
      name: X-CSRF-Token
      type: apiKey
info:
  title: HaoHao Browser API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get service health
      tags:
        - system
  /api/v1/session:
    get:
      operationId: getSession
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionBody"
          description: OK
          headers:
            Domain:
              schema:
                type: string
            Expires:
              schema:
                type: string
            HttpOnly:
              schema:
                type: boolean
            MaxAge:
              schema:
                format: int64
                type: integer
            Name:
              schema:
                type: string
            Partitioned:
              schema:
                type: boolean
            Path:
              schema:
                type: string
            Quoted:
              schema:
                type: boolean
            Raw:
              schema:
                type: string
            RawExpires:
              schema:
                type: string
            SameSite:
              schema:
                format: int64
                type: integer
            Secure:
              schema:
                type: boolean
            Set-Cookie:
              schema:
                type: string
            Unparsed:
              schema:
                type: string
            Value:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Get browser session bootstrap state
      tags:
        - session
  /external/v1/health:
    get:
      operationId: getExternalHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalHealthBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get external API health
      tags:
        - external-system
servers:
  - description: same-origin browser entrypoint
    url: /
