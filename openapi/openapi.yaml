info:
  title: HaoHao API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/external/v1/drive/files/{fileId}:
    delete:
      operationId: deleteExternalDriveFile
      parameters:
        - in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
        - in: path
          name: fileId
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: external bearer Drive file を削除する
      tags:
        - external-drive
  /api/external/v1/drive/files/{fileId}/metadata:
    get:
      operationId: getExternalDriveFileMetadata
      parameters:
        - in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
        - in: path
          name: fileId
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveFileBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: external bearer Drive file metadata を返す
      tags:
        - external-drive
  /api/external/v1/drive/files/{fileId}/shares:
    post:
      operationId: createExternalDriveFileShare
      parameters:
        - in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
        - in: path
          name: fileId
          required: true
          schema:
            format: uuid
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriveShareBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveShareBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: external bearer Drive file share を作成する
      tags:
        - external-drive
  /api/external/v1/drive/folders:
    post:
      operationId: createExternalDriveFolder
      parameters:
        - in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriveFolderBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveFolderBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: external bearer Drive folder を作成する
      tags:
        - external-drive
