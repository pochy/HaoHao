            maxLength: 64
            minLength: 3
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantAdminTenantRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantAdminTenantBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
