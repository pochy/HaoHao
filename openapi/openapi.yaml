info:
  description: |-
    HaoHao API は browser session API、tenant 管理 API、Drive API、external integration API をまとめた OpenAPI document です。

    ## 認証

    - browser API は `SESSION_ID` Cookie を使います。状態を変更する request では `X-CSRF-Token` も送ってください。
    - external / M2M / SCIM API は Bearer token を使います。必要な audience、scope、role は環境設定で制御されます。
    - tenant-scoped browser API は active tenant を前提にします。必要に応じて tenant select API で active tenant を切り替えます。

    ## Request の基本

    - UUID は OpenAPI 上では `format: uuid` として表します。
    - timestamp は RFC3339 UTC の `date-time` です。
    - list API の `limit` / `offset` は pagination に使います。
    - `Idempotency-Key` がある mutation API は、同じ key と同じ body の retry に対して保存済み response を返します。

    ## Error response

    error は Problem Details 形式です。validation error、認証エラー、認可エラー、not found、conflict、rate limit、server error は `application/problem+json` の `default` response として表します。
  title: HaoHao API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/external/v1/drive/files/{fileId}:
    delete:
      description: |-
        external bearer Drive file を削除する。

        browser Cookie に依存しない external client、M2M、SCIM integration 用 endpoint です。

        ### 使い方

        - Bearer token が必要です。token の audience、scope、role は環境設定に従って検証されます。
      operationId: deleteExternalDriveFile
      parameters:
        - description: "tenant を識別する slug です。例: `acme`。"
          example: acme
          in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
        - description: path 内の `fileId` を指定します。
          example: 018f2f05-c6c9-7a49-b32d-04f4dd84ef4a
          in: path
          name: fileId
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "204":
          description: 操作に成功しました。response body はありません。
        default:
          content:
            application/problem+json:
              examples:
                validation:
                  description: request body、path、query、header の validation に失敗した場合の例です。
                  summary: Validation error
                  value:
                    detail: Request validation failed.
                    errors:
                      - location: body.name
                        message: expected value to be at least 1 characters
                        value: ""
                    status: 422
                    title: Unprocessable Entity
                    type: https://example.com/problems/validation-error
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Problem Details 形式の error response です。validation、authentication、authorization、conflict、rate limit、server error などで返ります。
      security:
        - bearerAuth: []
      summary: external bearer Drive file を削除する
      tags:
        - External APIs
  /api/external/v1/drive/files/{fileId}/metadata:
    get:
      description: |-
        external bearer Drive file metadata を返す。

        browser Cookie に依存しない external client、M2M、SCIM integration 用 endpoint です。

        ### 使い方

        - Bearer token が必要です。token の audience、scope、role は環境設定に従って検証されます。
      operationId: getExternalDriveFileMetadata
      parameters:
        - description: "tenant を識別する slug です。例: `acme`。"
          example: acme
          in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
        - description: path 内の `fileId` を指定します。
          example: 018f2f05-c6c9-7a49-b32d-04f4dd84ef4a
          in: path
          name: fileId
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              examples:
                default:
                  description: 成功時に返る response body の例です。
                  summary: Example response
                  value:
                    $schema: https://example.com/schemas/DriveFileBody.json
                    byteSize: 1048576
                    contentType: text/markdown
                    createdAt: "2026-01-15T09:30:00Z"
                    deletedAt: "2026-01-15T09:30:00Z"
                    description: Quarterly planning documents.
                    dlpBlocked: false
                    inheritanceEnabled: true
                    lockReason: example
                    locked: true
                    lockedAt: "2026-01-15T09:30:00Z"
                    originalFilename: spec.md
                    publicId: 018f2f05-c6c9-7a49-b32d-04f4dd84ef4a
                    scanStatus: active
                    sha256Hex: 3a6eb0790f39ac87c94f3856b2dd2c5d110e6811602261a9a923d3bb23adc8b7
                    status: active
                    updatedAt: "2026-01-15T09:30:00Z"
                    workspacePublicId: 018f2f05-c6c9-7a49-b32d-04f4dd84ef4a
              schema:
                $ref: "#/components/schemas/DriveFileBody"
          description: 操作に成功し、response body に結果を返します。
        default:
          content:
            application/problem+json:
              examples:
                validation:
                  description: request body、path、query、header の validation に失敗した場合の例です。
                  summary: Validation error
                  value:
