services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: haohao-postgres
    environment:
      POSTGRES_DB: haohao
      POSTGRES_USER: haohao
      POSTGRES_PASSWORD: haohao
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haohao -d haohao"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: haohao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:25.10
    container_name: haohao-clickhouse
    mem_limit: ${CLICKHOUSE_MEM_LIMIT:-4g}
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./dev/clickhouse/config.d/local-dev.xml:/etc/clickhouse-server/config.d/local-dev.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 20

  openfga-postgres:
    image: postgres:18
    container_name: haohao-openfga-postgres
    environment:
      POSTGRES_DB: openfga
      POSTGRES_USER: openfga
      POSTGRES_PASSWORD: openfga
    volumes:
      - openfga-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfga -d openfga"]
      interval: 5s
      timeout: 5s
      retries: 20

  openfga-migrate:
    image: openfga/openfga:v1.11.6
    container_name: haohao-openfga-migrate
    depends_on:
      openfga-postgres:
        condition: service_healthy
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://openfga:openfga@openfga-postgres:5432/openfga?sslmode=disable

  openfga:
    image: openfga/openfga:v1.11.6
    container_name: haohao-openfga
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://openfga:openfga@openfga-postgres:5432/openfga?sslmode=disable
      OPENFGA_HTTP_ADDR: 0.0.0.0:8080
      OPENFGA_PLAYGROUND_ENABLED: ${OPENFGA_PLAYGROUND_ENABLED:-true}
    ports:
      - "127.0.0.1:8088:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=openfga:8081"]
      interval: 5s
      timeout: 30s
      retries: 3

  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    container_name: haohao-seaweedfs
    profiles:
      - seaweedfs
    command:
      - mini
      - -dir=/data
    environment:
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_ACCESS_KEY:-haohao}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_SECRET_KEY:-haohao-secret}
      S3_ENDPOINT: ${SEAWEEDFS_S3_ENDPOINT:-http://localhost:8333}
    ports:
      - "127.0.0.1:9333:9333"
      - "127.0.0.1:9340:9340"
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:8333:8333"
      - "127.0.0.1:7333:7333"
      - "127.0.0.1:23646:23646"
    volumes:
      - seaweedfs-data:/data

  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:cuda}
    container_name: haohao-open-webui
    profiles:
      - openwebui
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_HOST_BIND:-127.0.0.1}:${OPEN_WEBUI_HOST_PORT:-3000}:8080"
    environment:
      WEBUI_SECRET_KEY: ${OPEN_WEBUI_SECRET_KEY:-haohao-open-webui-dev-secret}
      WEBUI_AUTH: ${WEBUI_AUTH:-True}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-cl-nagoya/ruri-v3-310m}
      RAG_EMBEDDING_MODEL_TRUST_REMOTE_CODE: ${RAG_EMBEDDING_MODEL_TRUST_REMOTE_CODE:-True}
    volumes:
      - open-webui-data:/app/backend/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  infinity:
    build:
      context: .
      dockerfile: docker/infinity-ruri/Dockerfile
    image: ${INFINITY_IMAGE:-haohao/infinity-ruri:latest}
    container_name: haohao-infinity
    profiles:
      - openwebui
    restart: always
    ports:
      - "${INFINITY_HOST_BIND:-127.0.0.1}:${INFINITY_HOST_PORT:-7997}:7997"
    volumes:
      - infinity-model-cache:/app/.cache
    command:
      - v2
      - --model-id
      - ${INFINITY_EMBEDDING_MODEL:-cl-nagoya/ruri-v3-310m}
      - --model-id
      - ${INFINITY_RERANKER_MODEL:-cl-nagoya/ruri-v3-reranker-310m}
      - --device
      - ${INFINITY_DEVICE:-cpu}
      - --batch-size
      - ${INFINITY_BATCH_SIZE:-8}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  clickhouse-logs:
  openfga-postgres-data:
  seaweedfs-data:
  open-webui-data:
  infinity-model-cache:
