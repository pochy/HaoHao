services:
  postgres:
    image: postgres:18
    container_name: haohao-postgres
    environment:
      POSTGRES_DB: haohao
      POSTGRES_USER: haohao
      POSTGRES_PASSWORD: haohao
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haohao -d haohao"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: haohao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
